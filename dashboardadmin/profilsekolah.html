<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        /* Warna latar disamakan dengan konten dashboard */
        body { background-color: #f8fafc; color: #0f172a; padding: 2.5rem; }

        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8; --primary-light: #eff6ff;
            --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
            --radius-lg: 12px; --radius-md: 8px;
            --success: #10b981; --danger: #ef4444; --danger-light: #fef2f2;
        }

        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
        .page-header p { font-size: 0.95rem; color: var(--text-muted); }

        .card { background: #fff; padding: 2rem; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .section-title { font-size: 1.05rem; font-weight: 700; color: var(--primary); margin-bottom: 1.25rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary-light); margin-top: 1.5rem; }
        .section-title:first-child { margin-top: 0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        
        .form-control { padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 0.95rem; color: var(--text-main); background: #fff; transition: 0.2s; width: 100%; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        /* Tampilan Read Only */
        .form-control:disabled { background: transparent; border-color: transparent; padding-left: 0; font-weight: 500; color: var(--text-main); opacity: 1; -webkit-text-fill-color: var(--text-main); }

        .action-buttons { display: flex; gap: 1rem; }
        .btn { padding: 0.65rem 1.25rem; border-radius: var(--radius-md); font-weight: 600; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; border: none; transition: 0.2s; }
        .btn-edit { background: var(--primary-light); color: var(--primary); }
        .btn-edit:hover { background: #dbeafe; }
        .btn-save { background: var(--primary); color: #fff; display: none; }
        .btn-save:hover { background: var(--primary-hover); }
        .btn-cancel { background: var(--danger-light); color: var(--danger); display: none; }
        .btn-cancel:hover { background: #fee2e2; }

        #status-banner { display: none; padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; font-weight: 500; font-size: 0.9rem; }
        .status-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        /* Mobile responsive form */
        @media (max-width: 768px) {
            body { padding: 1.25rem; }
            .form-grid { grid-template-columns: 1fr; gap: 1rem; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .action-buttons { width: 100%; }
            .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <div>
            <h1>Informasi Profil Sekolah</h1>
            <p>Konfigurasi data identitas utama, lokasi, dan kontak institusi.</p>
        </div>
        <div class="action-buttons">
            <button class="btn btn-edit" id="btn-edit">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                Edit Data
            </button>
            <button class="btn btn-cancel" id="btn-cancel">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                Batal
            </button>
            <button class="btn btn-save" id="btn-save">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                Simpan Perubahan
            </button>
        </div>
    </div>

    <div id="status-banner"></div>

    <div class="card">
        <form id="form-profil">
            
            <div class="section-title">1. Identitas Sekolah</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nama Instansi</label>
                    <input type="text" id="nama_instansi" class="form-control" placeholder="Contoh: SD Negeri 1 Jember" disabled>
                </div>
                <div class="form-group">
                    <label>Nomor Pokok Sekolah Nasional (NPSN)</label>
                    <input type="text" id="npsn" class="form-control" placeholder="Contoh: 20512345" disabled>
                </div>
                <div class="form-group">
                    <label>Status Sekolah</label>
                    <select id="status_sekolah" class="form-control" disabled>
                        <option value="">- Pilih Status -</option>
                        <option value="NEGERI">NEGERI</option>
                        <option value="SWASTA">SWASTA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bentuk Pendidikan</label>
                    <select id="bentuk_pendidikan" class="form-control" disabled>
                        <option value="">- Pilih Bentuk Pendidikan -</option>
                        <option value="SD">SD</option>
                        <option value="MI">MI</option>
                        <option value="SMP">SMP</option>
                        <option value="MTS">MTS</option>
                        <option value="SMA">SMA</option>
                        <option value="SMK">SMK</option>
                        <option value="MA">MA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Naungan</label>
                    <input type="text" id="naungan" class="form-control" placeholder="Contoh: Kementerian Pendidikan dan Kebudayaan" disabled>
                </div>
                <div class="form-group">
                    <label>Nama Kepala Sekolah</label>
                    <input type="text" id="kepala_sekolah" class="form-control" placeholder="Masukkan nama beserta gelar" disabled>
                </div>
            </div>

            <div class="section-title">2. Detail Lokasi</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Alamat / Jalan</label>
                    <input type="text" id="alamat" class="form-control" placeholder="Contoh: Jl. Cempaka No. 13" disabled>
                </div>
                <div class="form-group">
                    <label>Desa / Kelurahan</label>
                    <input type="text" id="desa" class="form-control" placeholder="Contoh: Dukuh Dempok" disabled>
                </div>
                <div class="form-group">
                    <label>Kecamatan</label>
                    <input type="text" id="kecamatan" class="form-control" placeholder="Contoh: Kec. Wuluhan" disabled>
                </div>
                <div class="form-group">
                    <label>Kabupaten / Kota</label>
                    <input type="text" id="kabupaten" class="form-control" placeholder="Contoh: Kab. Jember" disabled>
                </div>
                <div class="form-group">
                    <label>Provinsi</label>
                    <input type="text" id="provinsi" class="form-control" placeholder="Contoh: Prov. Jawa Timur" disabled>
                </div>
            </div>

            <div class="section-title">3. Kontak & Media Sosial</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nomor Kontak / Telepon</label>
                    <input type="text" id="kontak" class="form-control" placeholder="Contoh: 0331-123456 / 0812345678" disabled>
                </div>
                <div class="form-group">
                    <label>Website Resmi</label>
                    <input type="text" id="website" class="form-control" placeholder="Contoh: www.sekolahanda.sch.id" disabled>
                </div>
                <div class="form-group">
                    <label>Instagram</label>
                    <input type="text" id="ig" class="form-control" placeholder="Contoh: @sekolahku" disabled>
                </div>
                <div class="form-group">
                    <label>TikTok</label>
                    <input type="text" id="tiktok" class="form-control" placeholder="Contoh: @sekolahku.official" disabled>
                </div>
                <div class="form-group">
                    <label>Facebook Halaman</label>
                    <input type="text" id="facebook" class="form-control" placeholder="Contoh: SD Negeri 1 Jember" disabled>
                </div>
            </div>
            
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyCBXA1Atpm8LpDSdAr02OEvuADP2bUT9Gk",
            authDomain: "eraport-87687.firebaseapp.com",
            projectId: "eraport-87687",
            storageBucket: "eraport-87687.firebasestorage.app",
            messagingSenderId: "879847959076",
            appId: "1:879847959076:web:51ca5db07bb4724b7e06b1",
            measurementId: "G-NWCTMGHZEV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const profilRef = doc(db, "sekolah", "profil_utama");

        // Deklarasi Elemen
        const formControls = document.querySelectorAll('.form-control');
        const btnEdit = document.getElementById('btn-edit');
        const btnSave = document.getElementById('btn-save');
        const btnCancel = document.getElementById('btn-cancel');
        const statusBanner = document.getElementById('status-banner');

        // Fungsi Tarik Data dari Firestore
        async function fetchProfilData() {
            try {
                const docSnap = await getDoc(profilRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Identitas
                    document.getElementById('nama_instansi').value = data.nama_instansi || "";
                    document.getElementById('npsn').value = data.npsn || "";
                    document.getElementById('status_sekolah').value = data.status_sekolah || "";
                    document.getElementById('bentuk_pendidikan').value = data.bentuk_pendidikan || "";
                    document.getElementById('naungan').value = data.naungan || "";
                    document.getElementById('kepala_sekolah').value = data.kepala_sekolah || "";
                    
                    // Lokasi
                    document.getElementById('alamat').value = data.alamat || "";
                    document.getElementById('desa').value = data.desa || "";
                    document.getElementById('kecamatan').value = data.kecamatan || "";
                    document.getElementById('kabupaten').value = data.kabupaten || "";
                    document.getElementById('provinsi').value = data.provinsi || "";
                    
                    // Kontak & Medsos
                    document.getElementById('kontak').value = data.kontak || "";
                    document.getElementById('website').value = data.website || "";
                    document.getElementById('ig').value = data.ig || "";
                    document.getElementById('tiktok').value = data.tiktok || "";
                    document.getElementById('facebook').value = data.facebook || "";
                }
            } catch (error) {
                console.error("Gagal menarik data:", error);
            }
        }

        // Tampilkan Mode Edit
        btnEdit.addEventListener('click', () => {
            formControls.forEach(input => input.removeAttribute('disabled'));
            btnEdit.style.display = "none";
            btnSave.style.display = "flex";
            btnCancel.style.display = "flex";
            statusBanner.style.display = "none";
        });

        // Batal & Kembalikan Data Lama
        btnCancel.addEventListener('click', () => {
            formControls.forEach(input => input.setAttribute('disabled', 'true'));
            btnEdit.style.display = "flex";
            btnSave.style.display = "none";
            btnCancel.style.display = "none";
            fetchProfilData();
        });

        // Simpan Data Baru ke Firestore
        btnSave.addEventListener('click', async () => {
            btnSave.innerHTML = "Menyimpan...";
            btnSave.disabled = true;

            const profilData = {
                // Identitas
                nama_instansi: document.getElementById('nama_instansi').value.trim(),
                npsn: document.getElementById('npsn').value.trim(),
                status_sekolah: document.getElementById('status_sekolah').value.trim(),
                bentuk_pendidikan: document.getElementById('bentuk_pendidikan').value.trim(),
                naungan: document.getElementById('naungan').value.trim(),
                kepala_sekolah: document.getElementById('kepala_sekolah').value.trim(),
                
                // Lokasi
                alamat: document.getElementById('alamat').value.trim(),
                desa: document.getElementById('desa').value.trim(),
                kecamatan: document.getElementById('kecamatan').value.trim(),
                kabupaten: document.getElementById('kabupaten').value.trim(),
                provinsi: document.getElementById('provinsi').value.trim(),
                
                // Kontak & Medsos
                kontak: document.getElementById('kontak').value.trim(),
                website: document.getElementById('website').value.trim(),
                ig: document.getElementById('ig').value.trim(),
                tiktok: document.getElementById('tiktok').value.trim(),
                facebook: document.getElementById('facebook').value.trim(),
                
                // Timestamp
                updatedAt: new Date().toISOString()
            };

            try {
                // Menggunakan merge: true memastikan kita tidak menghapus field lain di dokumen secara tidak sengaja
                await setDoc(profilRef, profilData, { merge: true });
                
                statusBanner.textContent = "Data profil berhasil disimpan!";
                statusBanner.className = "status-success";
                statusBanner.style.display = "block";
                setTimeout(() => statusBanner.style.display = "none", 4000);
                
                formControls.forEach(input => input.setAttribute('disabled', 'true'));
                btnEdit.style.display = "flex";
                btnSave.style.display = "none";
                btnCancel.style.display = "none";
            } catch (error) {
                console.error("Gagal menyimpan data:", error);
                statusBanner.textContent = "Terjadi kesalahan saat menyimpan data.";
                statusBanner.className = "status-error";
                statusBanner.style.display = "block";
            } finally {
                btnSave.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg> Simpan Perubahan`;
                btnSave.disabled = false;
            }
        });

        // Tarik data saat pertama kali halaman dimuat (Iframe di-load)
        window.addEventListener('DOMContentLoaded', fetchProfilData);
    </script>
</body>
</html>
